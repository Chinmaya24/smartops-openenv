version: '3.8'

services:
  fastapi:
    build: .
    container_name: smartops-fastapi
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    depends_on:
      - fastapi

volumes:
  n8n_data: